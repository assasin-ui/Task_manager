{% extends 'base.html' %}

{% block content %}

<h1 class="mb-4">Create Task</h1>

<form method="POST">

    {% csrf_token %}

    <div class="mb-3">

        <label class="form-label">
            Title
        </label>

        <input type="text"
               name="title"
               class="form-control"
               required>

    </div>

    <div class="mb-3">

        <label class="form-label">
            Description
        </label>

        <textarea name="description"
                  class="form-control"
                  rows="4"
                  required></textarea>

    </div>

    <div class="mb-3">

        <label class="form-label">
            Project
        </label>

        <select name="project"
                class="form-select">

            {% for project in projects %}

                <option value="{{ project.id }}">
                    {{ project.title }}
                </option>

            {% endfor %}

        </select>

    </div>

    <div class="mb-3">

        <label class="form-label">
            Assign To
        </label>

        <select name="assigned_to"
                class="form-select">

            {% for user in users %}

                <option value="{{ user.id }}">
                    {{ user.username }}
                </option>

            {% endfor %}

        </select>

    </div>

    <div class="mb-3">

        <label class="form-label">
            Due Date
        </label>

        <input type="date"
               name="due_date"
               class="form-control"
               required>

    </div>

    <button type="submit"
            class="btn btn-dark">

        Create Task

    </button>

</form>

{% endblock %}
