{% extends 'base.html' %}

{% block content %}

<h1 class="mb-4">Edit Task</h1>

<form method="POST">

    {% csrf_token %}

    <div class="mb-3">

        <label class="form-label">
            Title
        </label>

        <input type="text"
               name="title"
               value="{{ task.title }}"
               class="form-control">

    </div>

    <div class="mb-3">

        <label class="form-label">
            Description
        </label>

        <textarea name="description"
                  class="form-control"
                  rows="4">{{ task.description }}</textarea>

    </div>

    <div class="mb-3">

        <label class="form-label">
            Due Date
        </label>

        <input type="date"
               name="due_date"
               value="{{ task.due_date|date:'Y-m-d' }}"
               class="form-control">

    </div>

    <button type="submit"
            class="btn btn-dark">

        Save Changes

    </button>

</form>

{% endblock %}
